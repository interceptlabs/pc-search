let aR='all',aV='all';const sel=new Set();
function render(){
  const g=document.getElementById('grid');g.innerHTML='';let v=0,pc=0,cs='';
  const order=["japanese","chinese","indian","apac","diverse"];
  const sorted=[...I].sort((a,b)=>{const vo={'pass':0,'check':1,'fail':2};return vo[(a.v||'pass')]- vo[(b.v||'pass')]||order.indexOf(a.r)-order.indexOf(b.r)||a.s.localeCompare(b.s)});
  sorted.forEach(i=>{
    const vv=i.v||'pass';
    if(vv==='pass')pc++;
    const showR=aR==='all'||i.r===aR;
    const showV=aV==='all'||vv===aV;
    if(!showR||!showV)return;
    const label=i.r.charAt(0).toUpperCase()+i.r.slice(1);
    const secKey=label+' — '+i.s;
    if(secKey!==cs){cs=secKey;const h=document.createElement('div');h.className='sh';h.textContent=(vv==='check'?'NEEDS CHECK — ':'')+label+' — '+i.s;g.appendChild(h);}
    v++;
    const badgeCls=vv==='check'?' check':vv==='fail'?' fail':i.b?' branded':'';
    const badgeText=vv==='check'?'CHECK':vv==='fail'?'MAC':i.b||'PC';
    const c=document.createElement('div');c.className='card'+(vv==='check'?' check-card':'')+(sel.has(i.id)?' selected':'');c.dataset.id=i.id;c.onclick=()=>{sel.has(i.id)?sel.delete(i.id):sel.add(i.id);upd()};
    c.innerHTML=`<div class="iw"><img src="${i.thumb}" alt="${i.d}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none';this.parentElement.style.background='#1a1a1a'"><div class="badge${badgeCls}">${badgeText}</div><div class="chk"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7L6 10L11 4" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div><div class="ci"><div class="d">${i.d}</div><div class="cm"><span class="t s">${i.s}</span><span class="t r">${i.r}</span>${i.b?`<span class="t b">${i.b}</span>`:''}</div><a href="${i.url}" target="_blank" onclick="event.stopPropagation()">View on iStock →</a></div>`;
    g.appendChild(c);
  });
  document.getElementById('vc').textContent=v;
  document.getElementById('tc').textContent=I.length;
  document.getElementById('pass-count').textContent=pc;
}
function upd(){
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('selected',sel.has(c.dataset.id)));
  document.getElementById('sc').textContent=sel.size;
  document.getElementById('sc0').textContent=sel.size;
  document.getElementById('xbar').classList.toggle('vis',sel.size>0);
}
function clearSel(){sel.clear();upd()}
function exportSel(){
  const s=I.filter(i=>sel.has(i.id));
  const l=document.getElementById('ml');l.innerHTML='';
  document.getElementById('mt').textContent=s.length+' Selected';
  s.forEach(i=>{const li=document.createElement('li');li.innerHTML=`<div class="ld">${i.d}</div><div class="lm">${i.r} · ${i.s}${i.b?' · '+i.b:''}</div><a href="${i.url}" target="_blank">${i.url}</a>`;l.appendChild(li)});
  document.getElementById('modal').classList.add('open');
}
function copyLinks(){const s=I.filter(i=>sel.has(i.id)).map(i=>i.url).join('\n');navigator.clipboard.writeText(s).then(()=>toast('Links copied'))}
function copyCSV(){const s=I.filter(i=>sel.has(i.id));const h='Description,URL,Region,Setting,Brand';const r=s.map(i=>`"${i.d}","${i.url}","${i.r}","${i.s}","${i.b||'PC'}"`);navigator.clipboard.writeText([h,...r].join('\n')).then(()=>toast('CSV copied'))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
document.querySelectorAll('[data-verdict]').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('[data-verdict]').forEach(x=>x.classList.remove('on'));b.classList.add('on');aV=b.dataset.verdict;render()})});
document.querySelectorAll('[data-region]').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('[data-region]').forEach(x=>x.classList.remove('on'));b.classList.add('on');aR=b.dataset.region;render()})});
render();
